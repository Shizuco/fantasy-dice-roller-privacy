<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support - Fantasy Dice Roller</title>
    <style>
body {
    margin: 0;
    background: #f2e3bf;
    color: #2d2218;
    font-family: Georgia, "Times New Roman", serif;
    line-height: 1.7;
}

.page {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 16px;
}

.card {
    background: #f8edd1;
    border: 2px solid #5c4531;
    border-radius: 18px;
    padding: 32px;
    box-shadow: 0 8px 24px rgba(45, 34, 24, 0.18);
}

.hero {
    text-align: center;
    margin-top: 64px;
}

.center {
    text-align: center;
}

h1, h2 {
    color: #6d2435;
}

h1 {
    font-size: 2.2rem;
}

h2 {
    margin-top: 32px;
}

.subtitle {
    font-size: 1.2rem;
    color: #5b4a3a;
}

a {
    color: #6d2435;
    font-weight: bold;
}

.links {
    margin-top: 32px;
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
}

.links a {
    padding: 10px 18px;
    border: 1px solid #6d2435;
    border-radius: 999px;
    text-decoration: none;
}

hr {
    border: none;
    border-top: 1px solid #907054;
    margin: 32px 0;
}

ul {
    padding-left: 24px;
}

li {
    margin-bottom: 6px;
}

@media (max-width: 600px) {
    .card {
        padding: 22px;
    }

    h1 {
        font-size: 1.8rem;
    }

    .hero {
        margin-top: 24px;
    }
}
</style>
</head>
<body>

<main class="page">
    <section class="card">
        <h1>Support</h1>

        <p>
            Need help with Fantasy Dice Roller or want to report a bug?
        </p>

        <p>
            Contact:
            <a href="mailto:moodish.incorp@gmail.com">moodish.incorp@gmail.com</a>
        </p>

        <p>
            Please include your device model, Android version, and a short description of the issue.
        </p>

        <hr>

        <p><a href="index.html">← Back to Home</a></p>
    </section>
</main>

</body>
</html>
